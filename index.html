<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduGuardIA Lang</title>
    <!-- Commentaire: style unique de l'application chat-first -->
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>EduGuardIA Lang</h1>
        <div class="top-actions">
          <div class="tabs">
            <button id="tabCoachBtn" class="tab-btn tab-btn-active">Coach</button>
            <button id="tabTestBtn" class="tab-btn">Se tester</button>
          </div>
          <label class="field-inline">
            <span>Langue</span>
            <select id="languageSelect"></select>
          </label>
          <div class="badge">Points: <span id="points">0</span></div>
          <button id="superHintBtn" class="btn btn-secondary">Super indice</button>
          <button id="resetBtn" class="btn btn-ghost">Reset conversation</button>
        </div>
      </header>

      <main id="coachView" class="chat-layout">
        <section id="chatMessages" class="chat-messages"></section>
        <div id="understandingPanel" class="understanding-panel hidden">
          <span>As-tu compris ?</span>
          <button id="understoodYesBtn" class="btn btn-secondary">Oui, générer un QCM</button>
          <button id="understoodNoBtn" class="btn btn-ghost">Non, explique autrement</button>
        </div>
        <div class="chat-input-wrap">
          <textarea
            id="chatInput"
            rows="3"
            placeholder="Pose ta question (grammaire, conjugaison, vocabulaire...)"
          ></textarea>
          <button id="sendBtn" class="btn btn-primary">Envoyer</button>
        </div>
      </main>

      <main id="testView" class="chat-layout hidden">
        <section id="testMessages" class="chat-messages"></section>
        <div class="chat-input-wrap">
          <textarea
            id="testTopicInput"
            rows="2"
            placeholder="Entre un sujet (ex: vocabulaire médiéval, present perfect, faux amis...)"
          ></textarea>
          <button id="generateTestBtn" class="btn btn-primary">Générer un test de 20 QCM</button>
        </div>
      </main>
    </div>

    <!-- Commentaire: logique JS du chat, quiz et système de points -->
    <script src="/main.js"></script>
  </body>
</html>
